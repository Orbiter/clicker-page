<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>clicker.page</title>
  <link rel="stylesheet" href="./css/style.css?v=47">
</head>
<body>
  <header class="header">
    <div class="brand">
      <a class="brand-name" id="brandHomeLink" href="https://clicker.page">clicker.page</a><a class="brand-source" id="sourceLabel" href=""></a>
    </div>
    <div class="header-right">
      <div class="header-group" role="group" aria-label="Font size">
        <button class="header-btn" id="fontDecreaseBtn" type="button" aria-label="Decrease content font size">−</button>
        <button class="header-btn" id="fontResetBtn" type="button" aria-label="Reset content font size">1</button>
        <button class="header-btn" id="fontIncreaseBtn" type="button" aria-label="Increase content font size">+</button>
      </div>
      <div class="header-group" role="group" aria-label="Theme">
        <button class="header-btn" id="lightModeBtn" type="button" aria-label="Light mode">☀</button>
        <button class="header-btn" id="darkModeBtn" type="button" aria-label="Dark mode">☾</button>
      </div>
    </div>
  </header>

  <main class="app" id="app">
    <section class="dropzone" id="dropzone" aria-label="Drop markdown file or URL">
      <div>
        <h1>Drop markdown file or URL</h1>
        <p>
          Drop a <code>.md</code> file, a markdown URL, or plain markdown text.<br>
          Use arrow keys or swipe to navigate slides.
        </p>
      </div>
    </section>

    <section class="slide-wrap" id="slideWrap">
      <article class="slide" id="slide"></article>
    </section>

    <section class="print-deck" id="printDeck" aria-hidden="true"></section>

    <div class="pager" id="pager"></div>
  </main>

  <script src="./js/marked.min.js?v=1"></script>
  <script src="./js/mermaid.min.js?v=1"></script>
  <script src="./js/qrcode.min.js?v=1"></script>
  <script src="./js/app.js?v=67"></script>
</body>
</html>
