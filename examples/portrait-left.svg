<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Portrait split demo left</title>
  <desc id="desc">A tall sample card for testing left-side split layout.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4efe6" />
      <stop offset="100%" stop-color="#d7e6f5" />
    </linearGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)" rx="48" />
  <rect x="70" y="70" width="660" height="1060" rx="36" fill="#fffdf8" stroke="#111111" stroke-width="8" />
  <text x="110" y="180" font-family="Georgia, serif" font-size="56" fill="#111111">Portrait</text>
  <text x="110" y="250" font-family="Georgia, serif" font-size="56" fill="#111111">Image First</text>
  <text x="110" y="340" font-family="Arial, sans-serif" font-size="28" fill="#555555">Expected layout:</text>
  <text x="110" y="390" font-family="Arial, sans-serif" font-size="28" fill="#555555">image on the left</text>
  <text x="110" y="440" font-family="Arial, sans-serif" font-size="28" fill="#555555">Markdown on the right</text>
  <circle cx="400" cy="720" r="180" fill="#1f6aa5" opacity="0.15" />
  <path d="M240 830 C310 640, 490 640, 560 830" fill="none" stroke="#1f6aa5" stroke-width="18" stroke-linecap="round" />
  <path d="M290 760 L400 640 L510 760" fill="none" stroke="#111111" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  <text x="400" y="1020" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#111111">800 x 1200 SVG</text>
</svg>
